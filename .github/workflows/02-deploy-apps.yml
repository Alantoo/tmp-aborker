name: Deploy

on:
  workflow_run:
    workflows:
      - Build Image
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: [broker-agent]
    permissions:
      contents: read
      packages: read
    env:
      DOCKER_CONFIG: /tmp/docker-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup environment variables
        run: |
          echo '${{ secrets.env_vars }}' > ~/hosting/atty-broker/.env
      # Add the rest of your deployment steps here
      - name: Update docker-compose files
        id: update_docker_files
        run: |
          cp -v ./deploy/docker/docker-compose.yml ~/hosting/atty-broker/docker-compose.yml

      - name: Configure container registry auth
        run: |
          mkdir -p $DOCKER_CONFIG
          AUTH=$(echo -n "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" | base64)
          echo "{\"auths\":{\"ghcr.io\":{\"auth\":\"$AUTH\"}}}" > $DOCKER_CONFIG/config.json
      - name: Pull new image
        run: |
          docker-compose -f ~/hosting/atty-broker/docker-compose.yml pull
      - name: Stop running application
        run: |
          docker-compose -f ~/hosting/atty-broker/docker-compose.yml down
      - name: Start updated application
        run: |
          docker-compose -f ~/hosting/atty-broker/docker-compose.yml up -d
      - name: Remove old images
        run: docker image prune --all --filter "until=$((24 * 30))h" # removing images older than 1 mo
